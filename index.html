<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case File: #01 Genesis Hack</title>
  <link rel="stylesheet" href="style.css">
  <!-- To make the Tailwind classes work, we should include Tailwind, but waiting for user confirmation -->
</head>
<body class="bg-zinc-900 text-gray-300 min-h-screen m-0 p-0 font-sans">
  <div class="bg-black text-white p-8 border-b-2 border-blue-900">
    <h1 class="text-4xl font-bold uppercase tracking-widest">Case File: #01 Genesis Hack</h1>
    <p class="text-blue-400 mt-2 italic text-sm">Status: Investigation In Progress...</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 p-6 min-h-screen">
    <div class="col-span-2 space-y-6">
      <div class="border-2 border-dashed border-zinc-700 p-4 rounded-lg bg-zinc-800">
        <h2 class="text-xl font-bold mb-4 text-white">Evidence Locker</h2>
        <div class="grid grid-cols-3 gap-4">
          <div class="h-32 bg-zinc-700 rounded flex items-center justify-center text-xs">Crime Scene Photo</div>
          <div class="h-32 bg-zinc-700 rounded flex items-center justify-center text-xs">Wallet Transaction Log</div>
          <div class="h-32 bg-zinc-700 rounded flex items-center justify-center text-xs">Witness Statement</div>
        </div>
      </div>

      <div class="flex justify-around py-10">
        <div class="text-center opacity-50">
          <p>Envelope 1</p>
          <span class="text-4xl">🔒</span>
        </div>
        <div class="text-center opacity-50">
          <p>Envelope 2</p>
          <span class="text-4xl">🔒</span>
        </div>
        <div class="text-center opacity-50">
          <p>Envelope 3</p>
          <span class="text-4xl">🔒</span>
        </div>
      </div>
    </div>

    <div class="bg-zinc-800 p-6 rounded-xl border border-zinc-700 shadow-2xl">
      <h3 class="text-lg font-bold text-blue-500 mb-4 uppercase">Verification Portal</h3>
      <label class="block text-sm mb-2">Input Solution Code:</label>
      <input type="text" class="w-full bg-black border border-zinc-600 p-2 mb-4 rounded text-green-500 font-mono" placeholder="Enter Hash / Name">
      <button class="w-full bg-blue-700 hover:bg-blue-600 text-white font-bold py-3 rounded uppercase transition hover-effect">Submit Evidence</button>
      
      <div class="mt-8 border-t border-zinc-700 pt-4">
        <p class="text-xs text-gray-500">Need help? Unlock a Hint for 0.01 ETH.</p>
      </div>
    </div>
  </div>
</body>
</html>
